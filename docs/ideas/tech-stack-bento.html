<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech Stack — Single Bento, Marquee → Expand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400&family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --font-serif: 'Fraunces', Georgia, serif;
    --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --bg: #f6f3ed;
    --paper: #faf8f3;
    --ink: #1a1a1c;
    --ink-dim: #4d4d52;
    --ink-3: #8e8a82;
    --rule: rgba(26, 26, 28, 0.12);
    --accent: oklch(64% 0.18 28);

    --dark-paper: #1c1a14;
    --dark-paper-2: #221f17;
    --dark-ink: #f5f1e7;
    --dark-ink-3: #8b8678;
    --dark-rule: rgba(245, 241, 231, 0.10);

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: 48px 32px 96px;
    max-width: 880px;
    margin: 0 auto;
  }

  header.page { margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--rule); }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-3);
    margin-bottom: 8px;
  }
  h1 {
    font-family: var(--font-serif);
    font-weight: 400; font-size: 36px;
    letter-spacing: -0.01em; line-height: 1.1;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .lede {
    margin-top: 12px; color: var(--ink-dim);
    font-size: 15px; max-width: 60ch; line-height: 1.5;
  }

  .controls {
    display: flex; gap: 12px; align-items: center;
    margin: 24px 0 32px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--ink-3);
  }
  .controls button {
    font: inherit; color: var(--ink);
    background: transparent; border: 1px solid var(--rule);
    padding: 8px 14px; border-radius: 999px;
    cursor: pointer;
    transition: background 180ms var(--ease), border-color 180ms var(--ease);
  }
  .controls button:hover { background: var(--paper); border-color: rgba(26,26,28,0.25); }
  .controls button[aria-pressed="true"] {
    background: var(--ink); color: var(--bg);
    border-color: var(--ink);
  }

  /* ===== Bento ===== */
  .stack-bento {
    border-radius: 32px;
    background: var(--dark-paper);
    border: 1px solid var(--dark-rule);
    color: var(--dark-ink);
    overflow: hidden;
    cursor: pointer;
    transition:
      border-color 240ms var(--ease),
      transform 240ms var(--ease);
  }
  .stack-bento:hover {
    border-color: rgba(245, 241, 231, 0.18);
    transform: translateY(-2px);
  }
  .stack-bento.expanded { cursor: default; }
  .stack-bento.expanded:hover { transform: none; }

  .bento-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;
    padding: 28px 32px 0;
  }
  .head-text { flex: 1; }
  .bento-title {
    font-family: var(--font-sans);
    font-weight: 600; font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--dark-ink);
  }
  .bento-sub {
    margin-top: 4px;
    font-size: 13px;
    color: var(--dark-ink-3);
  }

  .toggle {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 12px;
    background: rgba(245, 241, 231, 0.06);
    border: 1px solid var(--dark-rule);
    color: var(--dark-ink);
    display: grid; place-items: center;
    cursor: pointer;
    transition: background 180ms var(--ease), transform 240ms var(--ease);
  }
  .toggle:hover { background: rgba(245, 241, 231, 0.10); }
  .toggle svg { width: 16px; height: 16px; transition: transform 320ms var(--ease); }
  .stack-bento.expanded .toggle svg { transform: rotate(45deg); }

  /* ===== Collapsed: marquee row ===== */
  .marquee {
    position: relative;
    padding: 24px 0 28px;
    margin-top: 16px;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
  }
  .marquee-track {
    display: flex;
    gap: 14px;
    width: max-content;
    animation: marquee 38s linear infinite;
  }
  .stack-bento:hover .marquee-track { animation-play-state: paused; }
  .stack-bento.expanded .marquee { display: none; }

  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: none; }
    .marquee { overflow-x: auto; }
  }

  .tile {
    flex-shrink: 0;
    width: 64px; height: 64px;
    border-radius: 16px;
    display: grid; place-items: center;
    background: var(--bg-color, #333);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.14),
      0 4px 12px -6px rgba(0, 0, 0, 0.5);
  }
  .tile img {
    width: 56%; height: 56%;
    object-fit: contain;
  }

  /* ===== Expanded grid ===== */
  .grid-wrap {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition:
      max-height 480ms var(--ease),
      opacity 320ms var(--ease);
  }
  .stack-bento.expanded .grid-wrap {
    max-height: 1600px;
    opacity: 1;
  }
  .grid-inner {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .group-label {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--dark-ink-3);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--dark-rule);
  }
  .group-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 14px;
  }
  @media (min-width: 600px) {
    .group-grid { grid-template-columns: repeat(6, 1fr); }
  }
  .tile-cell {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }
  .tile-cell .tile {
    width: 100%; aspect-ratio: 1 / 1; height: auto;
    border-radius: 20px;
  }
  .tile-cell .name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--dark-ink-3);
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* Light palette variant */
  body.light-palette .stack-bento {
    background: var(--paper);
    border-color: var(--rule);
    color: var(--ink);
  }
  body.light-palette .bento-title { color: var(--ink); }
  body.light-palette .bento-sub,
  body.light-palette .tile-cell .name,
  body.light-palette .group-label { color: var(--ink-3); }
  body.light-palette .toggle {
    background: rgba(26, 26, 28, 0.04);
    border-color: var(--rule);
    color: var(--ink);
  }
  body.light-palette .group-label { border-color: var(--rule); }
  body.light-palette .tile {
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.6),
      0 4px 12px -8px rgba(26, 26, 28, 0.2);
  }
</style>
</head>
<body>

<header class="page">
  <div class="eyebrow">Docs · Ideas · 2026-05-14</div>
  <h1>Tech Stack — <em>single bento, marquee, expand</em></h1>
  <p class="lede">
    One bento. Collapsed state shows a horizontal marquee of icons. Click anywhere on the card to
    expand into a grouped grid with names. Click the toggle again to collapse.
  </p>
</header>

<div class="controls">
  <span>Palette:</span>
  <button id="paletteDark" aria-pressed="true">Dark (inspiration)</button>
  <button id="paletteLight" aria-pressed="false">Light (editorial)</button>
</div>

<article class="stack-bento" id="bento" aria-expanded="false">
  <div class="bento-head">
    <div class="head-text">
      <div class="bento-title">Tech Stack</div>
      <div class="bento-sub">Tools I reach for</div>
    </div>
    <button class="toggle" id="toggle" aria-label="Expand stack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <div class="marquee" aria-hidden="true">
    <div class="marquee-track" id="marqueeTrack"></div>
  </div>

  <div class="grid-wrap">
    <div class="grid-inner" id="gridInner"></div>
  </div>
</article>

<script>
  const GROUPS = [
    {
      label: 'Languages',
      items: [
        { name: 'Python',     slug: 'python',     hex: '3776AB' },
        { name: 'C++',        slug: 'cplusplus',  hex: '00599C' },
        { name: 'JavaScript', slug: 'javascript', hex: 'F7DF1E' },
        { name: 'Bash',       slug: 'gnubash',    hex: '4EAA25' },
        { name: 'Swift',      slug: 'swift',      hex: 'F05138' },
      ],
    },
    {
      label: 'ML / AI',
      items: [
        { name: 'PyTorch',    slug: 'pytorch',    hex: 'EE4C2C' },
        { name: 'TensorFlow', slug: 'tensorflow', hex: 'FF6F00' },
        { name: 'ONNX',       slug: 'onnx',       hex: '005CED' },
        { name: 'OpenCV',     slug: 'opencv',     hex: '5C3EE8' },
        { name: 'NVIDIA',     slug: 'nvidia',     hex: '76B900' },
      ],
    },
    {
      label: 'Infra & DevOps',
      items: [
        { name: 'Docker',     slug: 'docker',     hex: '2496ED' },
        { name: 'Kubernetes', slug: 'kubernetes', hex: '326CE5' },
        { name: 'Jenkins',    slug: 'jenkins',    hex: 'D24939' },
        { name: 'GitLab',     slug: 'gitlab',     hex: 'FC6D26' },
        { name: 'AWS',        slug: 'amazonwebservices', hex: '232F3E' },
        { name: 'Grafana',    slug: 'grafana',    hex: 'F46800' },
      ],
    },
    {
      label: 'Frameworks & Tools',
      items: [
        { name: 'Flask',      slug: 'flask',      hex: '000000' },
        { name: 'PostgreSQL', slug: 'postgresql', hex: '4169E1' },
        { name: 'Selenium',   slug: 'selenium',   hex: '43B02A' },
        { name: 'Scrapy',     slug: 'scrapy',     hex: '60A839' },
        { name: 'Postman',    slug: 'postman',    hex: 'FF6C37' },
        { name: 'Git',        slug: 'git',        hex: 'F05032' },
      ],
    },
  ];

  function makeTile(tool, withName) {
    const t = document.createElement('div');
    t.className = 'tile';
    t.style.setProperty('--bg-color', `#${tool.hex}`);
    const img = document.createElement('img');
    img.src = `https://cdn.simpleicons.org/${tool.slug}/white`;
    img.alt = tool.name;
    img.loading = 'lazy';
    t.appendChild(img);
    if (!withName) return t;
    const wrap = document.createElement('div');
    wrap.className = 'tile-cell';
    wrap.appendChild(t);
    const n = document.createElement('span');
    n.className = 'name';
    n.textContent = tool.name;
    wrap.appendChild(n);
    return wrap;
  }

  // Flatten for marquee (duplicated for seamless loop)
  const allTools = GROUPS.flatMap((g) => g.items);
  const track = document.getElementById('marqueeTrack');
  [...allTools, ...allTools].forEach((tool) => track.appendChild(makeTile(tool, false)));

  // Build expanded grid
  const gridInner = document.getElementById('gridInner');
  GROUPS.forEach((group) => {
    const section = document.createElement('section');
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group.label;
    section.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    group.items.forEach((tool) => grid.appendChild(makeTile(tool, true)));
    section.appendChild(grid);
    gridInner.appendChild(section);
  });

  // Expand interaction
  const bento = document.getElementById('bento');
  const toggle = document.getElementById('toggle');
  function setExpanded(state) {
    bento.classList.toggle('expanded', state);
    bento.setAttribute('aria-expanded', String(state));
    toggle.setAttribute('aria-label', state ? 'Collapse stack' : 'Expand stack');
  }
  function handleClick(e) {
    const isExpanded = bento.classList.contains('expanded');
    // When expanded, only the toggle button collapses; clicking inside content does nothing.
    if (isExpanded && !e.target.closest('#toggle')) return;
    setExpanded(!isExpanded);
  }
  bento.addEventListener('click', handleClick);
  bento.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleClick(e); }
  });
  bento.tabIndex = 0;

  // Palette toggle
  const darkBtn = document.getElementById('paletteDark');
  const lightBtn = document.getElementById('paletteLight');
  function setPalette(light) {
    document.body.classList.toggle('light-palette', light);
    darkBtn.setAttribute('aria-pressed', String(!light));
    lightBtn.setAttribute('aria-pressed', String(light));
  }
  darkBtn.addEventListener('click', () => setPalette(false));
  lightBtn.addEventListener('click', () => setPalette(true));
</script>

</body>
</html>
