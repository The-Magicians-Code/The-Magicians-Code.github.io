<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heimdall — junk-ships world (watercolor)</title>
<!-- EXPERIMENT ONLY: brush face from Google Fonts CDN, matching hero.html's
     A/B setup. The shipped site self-hosts; a winner gets vendored like Fraunces. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap">
<style>
  :root {
    /* design-system tokens (shared with the redesign set) */
    --porcelain:      #F5F1E7;
    --porcelain-soft: rgba(245, 241, 231, 0.80);
    --gold:           #E6C77E;
    --vermillion:     #B33A2B;
    --ease-out:       cubic-bezier(0.22, 1, 0.36, 1);
    --brush:  'Nanum Brush Script', 'Songti SC', 'Iowan Old Style', Georgia, serif;
    --serif:  'Iowan Old Style', Georgia, 'Times New Roman', 'Songti SC', serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #b9a986;                 /* paper tone behind the image while it loads */
    color: var(--porcelain);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    overflow: hidden;
  }

  /* ============ Stage + painting ============ */
  .world { position: relative; width: 100vw; height: 100svh; overflow: hidden; }

  .painting {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 34% 50%;
    /* very slow ambient breathing so the still watercolor feels alive */
    animation: drift 46s var(--ease-out) infinite alternate;
    will-change: transform;
  }
  @keyframes drift {
    from { transform: scale(1.06) translate3d(-1.2%, 0.6%, 0); }
    to   { transform: scale(1.10) translate3d(1.2%, -0.9%, 0); }
  }

  /* Focal scrim — a soft radial pool of shade under the centered mark so the
     porcelain ink reads over the busy middle, feathering out to the painting.
     Second layer just seats the very edges. */
  .world::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(58vmax 46vmax at 50% 48%, rgba(18,12,7,0.44) 0%, rgba(18,12,7,0.22) 38%, rgba(18,12,7,0) 68%),
      linear-gradient(180deg, rgba(18,12,7,0.16) 0%, rgba(18,12,7,0) 26%, rgba(18,12,7,0) 74%, rgba(18,12,7,0.20) 100%);
  }

  /* ============ Content — one centered column ============ */
  .plate {
    position: absolute; inset: 0; z-index: 2;
    display: grid; place-items: center;
    text-align: center;
    padding: clamp(1.6rem, 5vh, 3.4rem) clamp(1.4rem, 6vw, 4rem);
  }
  .stack { display: flex; flex-direction: column; align-items: center; }

  /* --- the seeing-mark: a painted ink glyph, the focal emblem --- */
  .mark {
    font-family: var(--brush);
    font-weight: 400; line-height: 1;
    font-size: clamp(4.6rem, 13vw, 10.5rem);
    color: var(--porcelain);
    text-shadow: 0 2px 30px rgba(12,8,4,0.5);
    opacity: 0;
    animation: resolve 1.5s var(--ease-out) 0.3s forwards;
  }

  /* --- project title, right below the mark --- */
  .codename {
    margin: clamp(-0.2rem, -0.4vw, 0) 0 0;
    font-family: var(--brush);
    font-weight: 400; font-style: normal;
    font-size: clamp(3.4rem, 10vw, 8rem);
    line-height: 0.9; letter-spacing: 0.01em;
    color: var(--porcelain);
    text-shadow: 0 2px 26px rgba(12,8,4,0.5);
    opacity: 0;
    animation: resolve 1.45s var(--ease-out) 0.72s forwards;
  }

  /* --- supporting text, continuing the stack --- */
  .subtitle {
    margin: clamp(0.9rem, 2.4vh, 1.5rem) 0 0;
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.34em; text-transform: uppercase; color: var(--gold);
    text-shadow: 0 1px 12px rgba(12,8,4,0.6);
    opacity: 0;
    animation: resolve-soft 1.3s var(--ease-out) 1.12s forwards;
  }
  .line {
    margin: clamp(0.6rem, 1.6vh, 1rem) auto 0; max-width: 34ch;
    font-style: italic; font-size: clamp(1.05rem, 2vw, 1.4rem); line-height: 1.5;
    color: var(--porcelain);
    text-shadow: 0 1px 18px rgba(12,8,4,0.65);
    opacity: 0;
    animation: resolve-soft 1.35s var(--ease-out) 1.32s forwards;
  }
  .more {
    display: inline-flex; align-items: center; gap: 0.5em;
    margin-top: clamp(1.2rem, 3vh, 2rem);
    font-family: var(--serif);
    font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--porcelain); text-decoration: none; position: relative;
    text-shadow: 0 1px 14px rgba(12,8,4,0.65);
    opacity: 0;
    animation: resolve-soft 1.35s var(--ease-out) 1.52s forwards;
  }
  .more .arr { transition: transform 0.35s var(--ease-out); }
  .more::after {
    content: ''; position: absolute; left: 0; bottom: -4px;
    width: 100%; height: 1px; background: var(--gold);
    transform: scaleX(0); transform-origin: center; transition: transform 0.35s var(--ease-out);
  }
  .more:hover::after, .more:focus-visible::after { transform: scaleX(1); }
  .more:hover .arr, .more:focus-visible .arr { transform: translateX(4px); }
  .more:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; border-radius: 2px; }

  /* The xuan-seal blur-resolve, ported to an on-load reveal:
     blur 18px→0 + fade + a small rise & settle. Softer variant for the meta. */
  @keyframes resolve {
    from { opacity: 0; filter: blur(18px); transform: translateY(3.2vh) scale(0.985); }
    to   { opacity: 1; filter: blur(0);    transform: translateY(0)    scale(1); }
  }
  @keyframes resolve-soft {
    from { opacity: 0; filter: blur(12px); transform: translateY(2.2vh); }
    to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
  }

  @media (max-aspect-ratio: 1/1) {
    .painting { object-position: 44% 42%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .painting { animation: none; transform: scale(1.04); }
    .mark, .codename, .subtitle, .line, .more {
      animation: none; opacity: 1; filter: none; transform: none;
    }
  }
</style>
</head>
<body>
  <main class="world">
    <picture>
      <source media="(max-aspect-ratio: 1/1)" srcset="junkships-portrait.png" />
      <img class="painting" src="junkships.png"
           alt="Watercolor of red-sailed junk ships gliding past misty mountains and a pagoda village at sunset" />
    </picture>

    <div class="plate">
      <div class="stack">
        <span class="mark" aria-hidden="true">見</span>
        <h1 class="codename">Heimdall</h1>
        <p class="subtitle">Vision pipeline for edge inference</p>
        <p class="line">A vessel learning to see the sea it sails.</p>
        <a class="more" href="#">Read the trial <span class="arr">&rarr;</span></a>
      </div>
    </div>
  </main>
</body>
</html>
