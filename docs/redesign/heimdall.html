<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Heimdall — ink seascape (project world)</title>
<style>
  :root {
    --porcelain:      #F0EDE4;
    --porcelain-soft: rgba(240, 237, 228, 0.70);
    --gold:           #C9A961;
    --gold-soft:      rgba(201, 169, 97, 0.60);
    --vermillion:     #B33A2B;
    --ease-out:       cubic-bezier(0.22, 1, 0.36, 1);
    --serif: 'Iowan Old Style', Georgia, 'Times New Roman', 'Songti SC', serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    /* moonlit night sky sinking into deep ocean */
    background:
      radial-gradient(46vmax 34vmax at 76% 15%, rgba(190,210,232,0.16) 0%, rgba(190,210,232,0) 60%),
      linear-gradient(180deg, #081019 0%, #0a1826 46%, #0c2236 100%);
    color: var(--porcelain);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  /* ============ Tableau ============ */
  .tableau { text-align: center; padding: 4vh 6vw; width: min(780px, 92vw); }
  .illo {
    display: block; width: 100%; height: auto;
    margin: 0 auto clamp(0.4rem, 2.4vh, 1.4rem);
    opacity: 0; animation: illo-in 1.8s var(--ease-out) 0.1s forwards;
    /* feather the sea's sides + bottom so the block melts into the night */
    -webkit-mask-image:
      linear-gradient(90deg, transparent 0, #000 14%, #000 86%, transparent 100%),
      linear-gradient(180deg, #000 52%, transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(90deg, transparent 0, #000 14%, #000 86%, transparent 100%),
      linear-gradient(180deg, #000 52%, transparent 100%);
    mask-composite: intersect;
  }
  @keyframes illo-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .codename {
    margin: 0; font-size: clamp(3.2rem, 8vw, 6.4rem); font-weight: 400;
    line-height: 1; letter-spacing: -0.015em; color: var(--porcelain);
    opacity: 0; animation: fade-up 1.1s var(--ease-out) 0.55s forwards;
  }
  .subtitle {
    margin: clamp(0.7rem, 1.8vh, 1rem) 0 0; font-size: 0.72rem;
    letter-spacing: 0.34em; text-transform: uppercase; color: var(--gold-soft);
    opacity: 0; animation: fade-up 1.1s var(--ease-out) 0.72s forwards;
  }
  .line {
    margin: clamp(0.9rem, 2.4vh, 1.4rem) auto 0; max-width: 30ch;
    font-style: italic; font-size: clamp(1.05rem, 2vw, 1.35rem); line-height: 1.5;
    color: var(--porcelain-soft);
    opacity: 0; animation: fade-up 1.2s var(--ease-out) 0.9s forwards;
  }
  .more {
    display: inline-block; margin-top: clamp(1.2rem, 3.2vh, 2rem);
    font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); text-decoration: none; position: relative;
    opacity: 0; animation: fade-up 1.2s var(--ease-out) 1.08s forwards;
  }
  .more::after {
    content: ''; position: absolute; left: 0; bottom: -3px;
    width: 100%; height: 1px; background: currentColor;
    transform: scaleX(0); transform-origin: left; transition: transform 0.35s var(--ease-out);
  }
  .more:hover::after, .more:focus-visible::after { transform: scaleX(1); }
  @keyframes fade-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ============ Illustration motion ============ */
  /* Wave bands are periodic (period 200) and over-drawn ±240, so a translate of
     exactly one period loops seamlessly. Layered speeds = parallax rolling sea. */
  .wave { transform-box: fill-box; will-change: transform; }
  .wave-1 { animation: drift-l 48s linear infinite; }
  .wave-2 { animation: drift-r 40s linear infinite; }
  .wave-3 { animation: drift-l 33s linear infinite; }
  .wave-4 { animation: drift-r 27s linear infinite; }
  .wave-5 { animation: drift-l 22s linear infinite; }
  @keyframes drift-l { to { transform: translateX(-200px); } }
  @keyframes drift-r { to { transform: translateX(200px); } }

  .ship { transform-box: fill-box; transform-origin: center bottom; will-change: transform; }
  .ship-hero { animation: bob-hero 9s ease-in-out infinite; }
  .ship-far  { animation: bob-far 13s ease-in-out infinite; }
  @keyframes bob-hero { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-6px) rotate(1deg); } }
  @keyframes bob-far  { 0%,100% { transform: translateY(0) rotate(-0.5deg); } 50% { transform: translateY(-3px) rotate(0.5deg); } }

  .glint { animation: shimmer 6.5s ease-in-out infinite; }
  .glint-b { animation: shimmer 8s ease-in-out infinite 1s; }
  @keyframes shimmer { 0%,100% { opacity: 0.22; } 50% { opacity: 0.5; } }

  @media (prefers-reduced-motion: reduce) {
    .illo, .codename, .subtitle, .line, .more { animation: none; opacity: 1; transform: none; }
    .wave, .ship, .glint, .glint-b { animation: none !important; }
  }
</style>
</head>
<body>
  <main class="tableau">
    <svg class="illo" viewBox="0 0 800 460" fill="none" aria-hidden="true">
      <defs>
        <radialGradient id="moonG" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#F6F1DE"/>
          <stop offset="70%" stop-color="#E7E2CE"/>
          <stop offset="100%" stop-color="#CFC9B4"/>
        </radialGradient>
        <linearGradient id="sail" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#E4C282"/>
          <stop offset="100%" stop-color="#A0692E"/>
        </linearGradient>
        <linearGradient id="sea1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#15334C"/><stop offset="100%" stop-color="#0E2236"/></linearGradient>
        <linearGradient id="sea2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#183A53"/><stop offset="100%" stop-color="#102A42"/></linearGradient>
        <linearGradient id="sea3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1E4666"/><stop offset="100%" stop-color="#12314C"/></linearGradient>
        <linearGradient id="sea4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#265A80"/><stop offset="100%" stop-color="#163C5A"/></linearGradient>
        <linearGradient id="sea5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2F6B98"/><stop offset="100%" stop-color="#1C486C"/></linearGradient>
      </defs>

      <!-- moon + halo -->
      <circle cx="632" cy="92" r="76" fill="rgba(220,228,240,0.05)"/>
      <circle cx="632" cy="92" r="40" fill="url(#moonG)"/>
      <circle cx="632" cy="92" r="40" fill="none" stroke="rgba(246,241,222,0.35)" stroke-width="1"/>

      <!-- band 1 · horizon -->
      <g class="wave wave-1">
        <path d="M-240 300 C-207 295 -173 295 -140 300 S-73 305 -40 300 S27 295 60 300 S127 305 160 300 S227 295 260 300 S327 305 360 300 S427 295 460 300 S527 305 560 300 S627 295 660 300 S727 305 760 300 S827 295 860 300 S927 305 960 300 S1027 295 1040 300 L1040 474 L-240 474 Z"
              fill="url(#sea1)" stroke="rgba(190,214,232,0.28)" stroke-width="1"/>
      </g>

      <!-- distant junk -->
      <g class="ship ship-far" opacity="0.72">
        <path d="M198 300 Q214 296 232 296 Q250 296 264 300 Q252 309 231 309 Q210 309 198 300 Z"
              fill="#0B1A28" stroke="rgba(180,205,225,0.4)" stroke-width="0.8"/>
        <path d="M231 298 L231 266" stroke="rgba(210,224,238,0.65)" stroke-width="1"/>
        <path d="M231 271 Q252 277 249 298 L231 295 Z" fill="url(#sail)" stroke="rgba(240,237,228,0.3)" stroke-width="0.7"/>
        <path d="M231 280 H247 M231 288 H249" stroke="rgba(60,40,18,0.5)" stroke-width="0.7"/>
      </g>

      <!-- band 2 -->
      <g class="wave wave-2">
        <path d="M-240 330 C-207 338 -173 338 -140 330 S-73 322 -40 330 S27 338 60 330 S127 322 160 330 S227 338 260 330 S327 322 360 330 S427 338 460 330 S527 322 560 330 S627 338 660 330 S727 322 760 330 S827 338 860 330 S927 322 960 330 S1027 338 1040 330 L1040 474 L-240 474 Z"
              fill="url(#sea2)" stroke="rgba(190,214,232,0.30)" stroke-width="1"/>
      </g>

      <!-- moon reflection (silver glints) -->
      <g class="glint" stroke="rgba(232,238,246,0.8)" stroke-width="2.4" stroke-linecap="round">
        <path d="M614 336 H650"/><path d="M606 352 H658"/><path d="M620 366 H644"/>
      </g>

      <!-- band 3 -->
      <g class="wave wave-3">
        <path d="M-240 362 C-207 352 -173 352 -140 362 S-73 372 -40 362 S27 352 60 362 S127 372 160 362 S227 352 260 362 S327 372 360 362 S427 352 460 362 S527 372 560 362 S627 352 660 362 S727 372 760 362 S827 352 860 362 S927 372 960 362 S1027 352 1040 362 L1040 474 L-240 474 Z"
              fill="url(#sea3)" stroke="rgba(198,220,236,0.34)" stroke-width="1.1"/>
      </g>

      <!-- hero junk -->
      <g class="ship ship-hero">
        <!-- elongated hull with graceful sheer -->
        <path d="M300 366 C312 344 328 346 334 356 L346 372 Q400 385 454 372 L468 352 C476 342 494 347 504 368 Q458 396 400 398 Q330 396 300 366 Z"
              fill="#0A1622" stroke="rgba(184,208,228,0.55)" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M346 372 Q400 382 454 372" stroke="rgba(184,208,228,0.3)" stroke-width="1"/>
        <!-- main mast + billowed lugsail -->
        <path d="M400 376 L400 232" stroke="rgba(214,226,240,0.8)" stroke-width="2"/>
        <path d="M400 240 C442 248 478 300 468 372 L400 366 Z"
              fill="url(#sail)" stroke="rgba(244,238,222,0.45)" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M400 264 H460 M400 288 H465 M400 312 H466 M400 336 H464 M400 358 H459" stroke="rgba(58,38,16,0.5)" stroke-width="1"/>
        <!-- foremast + sail -->
        <path d="M342 374 L342 284" stroke="rgba(214,226,240,0.7)" stroke-width="1.6"/>
        <path d="M342 290 C316 298 306 340 318 372 L342 366 Z"
              fill="url(#sail)" stroke="rgba(244,238,222,0.4)" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M342 312 H322 M342 334 H318 M342 356 H322" stroke="rgba(58,38,16,0.5)" stroke-width="0.9"/>
        <!-- pennant -->
        <path d="M400 232 Q418 227 413 238 Q404 236 400 240 Z" fill="var(--vermillion)"/>
      </g>

      <!-- hero warm reflection -->
      <g class="glint-b" stroke="rgba(224,180,110,0.7)" stroke-width="2.2" stroke-linecap="round">
        <path d="M372 400 H430"/><path d="M384 414 H418"/>
      </g>

      <!-- band 4 (occludes hull waterline) -->
      <g class="wave wave-4">
        <path d="M-240 396 C-207 408 -173 408 -140 396 S-73 384 -40 396 S27 408 60 396 S127 384 160 396 S227 408 260 396 S327 384 360 396 S427 408 460 396 S527 384 560 396 S627 408 660 396 S727 384 760 396 S827 408 860 396 S927 384 960 396 S1027 408 1040 396 L1040 474 L-240 474 Z"
              fill="url(#sea4)" stroke="rgba(206,226,240,0.40)" stroke-width="1.2"/>
      </g>

      <!-- band 5 · foreground with scattered foam -->
      <g class="wave wave-5">
        <path d="M-240 430 C-207 416 -173 416 -140 430 S-73 444 -40 430 S27 416 60 430 S127 444 160 430 S227 416 260 430 S327 444 360 430 S427 416 460 430 S527 444 560 430 S627 416 660 430 S727 444 760 430 S827 416 860 430 S927 444 960 430 S1027 416 1040 430 L1040 474 L-240 474 Z"
              fill="url(#sea5)" stroke="rgba(214,232,244,0.5)" stroke-width="1.3"/>
        <path d="M-240 430 C-207 416 -173 416 -140 430 S-73 444 -40 430 S27 416 60 430 S127 444 160 430 S227 416 260 430 S327 444 360 430 S427 416 460 430 S527 444 560 430 S627 416 660 430 S727 444 760 430 S827 416 860 430 S927 444 960 430 S1027 416 1040 430"
              fill="none" stroke="rgba(224,238,248,0.5)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 12"/>
      </g>
    </svg>

    <h2 class="codename">Heimdall</h2>
    <p class="subtitle">Vision pipeline for edge inference</p>
    <p class="line">A vessel learning to see the sea it sails.</p>
    <a class="more" href="#">Read the trial &rarr;</a>
  </main>
</body>
</html>
